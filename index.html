<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>KIM'S CLUB · VM 체크리스트</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
:root{
  --red:#e11d48;--red-d:#be123c;--red-l:#fef2f2;
  --dark:#1a1712;--muted:#7a7060;--bg:#fafaf9;--border:#e5e1d8;
  --green:#22a034;--yellow:#eab308;--orange:#ea580c;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);font-family:'Pretendard',sans-serif;color:var(--dark);max-width:500px;margin:0 auto;min-height:100vh;padding-bottom:40px;}

.hdr{background:#fff;padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.hdr-logo{font-size:17px;font-weight:900;letter-spacing:-.5px;}
.hdr-back{font-size:22px;cursor:pointer;background:none;border:none;font-family:inherit;}
.hdr-admin{background:var(--dark);color:#fff;padding:6px 12px;border-radius:20px;font-size:11px;font-weight:800;cursor:pointer;border:none;font-family:inherit;}
.hdr-admin.active{background:var(--red);}

/* 메인 홈 */
.home-title{padding:30px 20px 20px;}
.home-title h1{font-size:28px;font-weight:900;line-height:1.2;}
.home-title h1 em{color:var(--red);font-style:normal;}
.home-title p{font-size:13px;color:var(--muted);margin-top:6px;}

.menu-btn{display:flex;align-items:center;gap:14px;width:calc(100% - 40px);margin:10px 20px;padding:20px;border-radius:16px;border:none;cursor:pointer;font-family:inherit;text-align:left;font-size:15px;font-weight:700;transition:all .15s;}
.menu-btn-main{background:var(--red);color:#fff;}
.menu-btn-main:hover{background:var(--red-d);}
.menu-btn-sub{background:#fff;color:var(--dark);border:1px solid var(--border);}
.menu-btn-sub:hover{border-color:var(--red);}
.menu-btn .ico{font-size:24px;}
.menu-btn .arrow{margin-left:auto;font-size:20px;opacity:.6;}
.menu-btn .sub-text{font-size:12px;font-weight:500;margin-top:3px;opacity:.8;}

/* 섹션 라벨 */
.section-label{font-size:11px;font-weight:800;color:var(--muted);padding:20px 24px 6px;letter-spacing:.5px;text-transform:uppercase;}

/* 입력 폼 */
.form-section{padding:20px;}
.form-label{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.5px;}
.form-input, .form-select, .form-textarea{
  width:100%;padding:14px 16px;border:1.5px solid var(--border);border-radius:12px;
  font-size:15px;font-family:inherit;background:#fff;font-weight:500;
}
.form-input:focus, .form-select:focus, .form-textarea:focus{outline:none;border-color:var(--red);}
.form-textarea{resize:vertical;min-height:80px;}
.form-group{margin-bottom:18px;}

/* 점검 유형 */
.type-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.type-btn{padding:14px 4px;border:1.5px solid var(--border);border-radius:12px;background:#fff;font-family:inherit;font-size:12px;font-weight:800;cursor:pointer;transition:all .15s;text-align:center;}
.type-btn .type-ico{font-size:20px;display:block;margin-bottom:4px;}
.type-btn.active{background:var(--red);color:#fff;border-color:var(--red);}

.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.cat-btn{padding:16px;border:1.5px solid var(--border);border-radius:12px;background:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;}
.cat-btn.active{background:var(--red);color:#fff;border-color:var(--red);}

/* 체크리스트 항목 */
.checklist{background:#fff;border:1px solid var(--border);border-radius:12px;padding:8px;margin-bottom:12px;}
.check-item{display:flex;align-items:center;gap:10px;padding:10px 8px;border-bottom:1px solid #f5f5f4;}
.check-item:last-child{border-bottom:none;}
.check-item-text{flex:1;font-size:13px;font-weight:600;line-height:1.4;}
.check-btn{width:44px;height:32px;border:1.5px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;font-family:inherit;font-size:16px;font-weight:800;}
.check-btn.pass{background:var(--green);color:#fff;border-color:var(--green);}
.check-btn.fail{background:var(--red);color:#fff;border-color:var(--red);}

/* 점수 표시 */
.score-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:900;}
.score-A{background:#dcfce7;color:#15803d;}
.score-B{background:#fef9c3;color:#a16207;}
.score-C{background:#fee2e2;color:#b91c1c;}

.score-big{font-size:36px;font-weight:900;line-height:1;}
.score-big.A{color:var(--green);}
.score-big.B{color:var(--yellow);}
.score-big.C{color:var(--red);}

.photo-area{border:2px dashed var(--border);border-radius:12px;padding:30px 20px;text-align:center;cursor:pointer;background:#fff;transition:all .15s;}
.photo-area:hover{border-color:var(--red);}
.photo-area.has-img{padding:0;border-style:solid;overflow:hidden;position:relative;}
.photo-area img{width:100%;display:block;}
.photo-area .ico{font-size:36px;margin-bottom:8px;}
.photo-area .photo-hint{font-size:13px;color:var(--muted);}
.photo-area .photo-remove{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:32px;height:32px;font-size:16px;cursor:pointer;}

.btn-submit{
  width:calc(100% - 40px);margin:20px;padding:16px;background:var(--red);color:#fff;
  border:none;border-radius:12px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:460px;
  box-shadow:0 -4px 12px rgba(0,0,0,.08);
}
.btn-submit:hover{background:var(--red-d);}
.btn-submit:disabled{background:#d1d1d1;cursor:not-allowed;}

/* 이력 */
.list-item{background:#fff;margin:10px 20px;padding:16px;border-radius:12px;border:1px solid var(--border);cursor:pointer;}
.list-item img{width:100%;max-height:160px;object-fit:cover;border-radius:8px;margin-bottom:10px;}
.list-item-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px;}
.list-item-title{font-size:15px;font-weight:800;}
.list-item-meta{font-size:12px;color:var(--muted);display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.list-item-memo{font-size:13px;color:var(--dark);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);line-height:1.5;}
.admin-comment{background:#fef9c3;border-left:3px solid var(--yellow);padding:10px 12px;border-radius:6px;margin-top:10px;font-size:13px;}
.admin-comment .ac-label{font-size:10px;font-weight:800;color:#a16207;margin-bottom:4px;}
.list-empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;}

/* 필터 */
.filter-bar{display:flex;gap:6px;padding:10px 20px;background:#fff;border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;}
.filter-chip{padding:8px 14px;border:1px solid var(--border);border-radius:20px;background:#fff;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;}
.filter-chip.active{background:var(--dark);color:#fff;border-color:var(--dark);}

/* 모달 */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal.show{display:flex;}
.modal-content{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:400px;}
.modal-title{font-size:18px;font-weight:900;margin-bottom:16px;}
.modal-actions{display:flex;gap:8px;margin-top:16px;}
.modal-btn{flex:1;padding:12px;border:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer;}
.modal-btn-primary{background:var(--red);color:#fff;}
.modal-btn-cancel{background:#e5e1d8;color:var(--dark);}

/* 토스트 */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}

/* 로딩 */
.loading{text-align:center;padding:40px;color:var(--muted);font-size:14px;}
.spinner{display:inline-block;width:20px;height:20px;border:2.5px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg)}}

/* 지점 순위 대시보드 */
.dashboard-header{padding:20px;background:#fff;border-bottom:1px solid var(--border);}
.dashboard-stat{display:flex;gap:12px;margin-top:12px;}
.stat-card{flex:1;background:var(--bg);padding:12px;border-radius:10px;text-align:center;}
.stat-card .stat-val{font-size:20px;font-weight:900;}
.stat-card .stat-lbl{font-size:11px;color:var(--muted);margin-top:2px;}

.rank-list{padding:10px 20px;}
.rank-row{display:flex;align-items:center;gap:10px;padding:12px;background:#fff;margin-bottom:6px;border-radius:10px;border:1px solid var(--border);}
.rank-medal{width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;border-radius:50%;}
.rank-medal.gold{background:#fef3c7;color:#b45309;}
.rank-medal.silver{background:#e5e7eb;color:#4b5563;}
.rank-medal.bronze{background:#fed7aa;color:#9a3412;}
.rank-medal.normal{background:#f3f4f6;color:#6b7280;font-size:14px;}
.rank-name{flex:1;font-size:14px;font-weight:700;}
.rank-count{font-size:11px;color:var(--muted);}
.rank-score{font-size:20px;font-weight:900;}

.hidden{display:none !important;}
</style>
</head>
<body>

<!-- 홈 화면 -->
<div id="homeView">
  <div class="hdr">
    <div class="hdr-logo">KIM'S CLUB</div>
    <span></span>
  </div>
  <div class="home-title">
    <h1>디지털<br>VM <em>체크리스트</em></h1>
    <p>모바일 현장 점검 및 VMD 관리 시스템</p>
  </div>

  <div class="section-label">현장 직원</div>
  <button class="menu-btn menu-btn-main" onclick="showView('register')">
    <span class="ico">📋</span>
    <div>
      <div>새 점검 등록</div>
      <div class="sub-text">현장 점검 시작하기</div>
    </div>
    <span class="arrow">›</span>
  </button>
  <button class="menu-btn menu-btn-sub" onclick="showView('history')">
    <span class="ico">📅</span>
    <div>
      <div>점검 월별 피드백</div>
      <div class="sub-text" style="color:var(--muted)">수정 및 삭제 가능</div>
    </div>
    <span class="arrow">›</span>
  </button>

  <div class="section-label">VMD 관리자</div>
  <button class="menu-btn menu-btn-sub" onclick="openAdminMenu()">
    <span class="ico">⚙️</span>
    <div>
      <div>관리자 메뉴</div>
      <div class="sub-text" style="color:var(--muted)">점수 집계 · 지점 순위 · 코멘트</div>
    </div>
    <span class="arrow">›</span>
  </button>
</div>

<!-- 등록 화면 -->
<div id="registerView" class="hidden">
  <div class="hdr">
    <button class="hdr-back" onclick="showView('home')">←</button>
    <div class="hdr-logo">새 점검 등록</div>
    <span></span>
  </div>
  <div class="form-section">
    <div class="form-group">
      <label class="form-label">점검 유형</label>
      <div class="type-grid">
        <button type="button" class="type-btn active" data-type="VM" onclick="selType(this)">
          <span class="type-ico">📊</span>VM
        </button>
        <button type="button" class="type-btn" data-type="광고" onclick="selType(this)">
          <span class="type-ico">📣</span>광고
        </button>
        <button type="button" class="type-btn" data-type="청소" onclick="selType(this)">
          <span class="type-ico">🧹</span>청소
        </button>
        <button type="button" class="type-btn" data-type="품질" onclick="selType(this)">
          <span class="type-ico">✨</span>품질
        </button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">지점</label>
      <select class="form-select" id="inStore">
        <option value="">-- 선택하세요 --</option>
        <option>강서점</option><option>강남점</option><option>분당점</option><option>송파점</option>
        <option>평촌점</option><option>부천점</option><option>야탑점</option><option>불광점</option>
        <option>신구로점</option><option>구의점</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">카테고리</label>
      <div class="cat-grid">
        <button type="button" class="cat-btn" data-cat="농산" onclick="selCat(this)">🥬 농산</button>
        <button type="button" class="cat-btn" data-cat="수산" onclick="selCat(this)">🐟 수산</button>
        <button type="button" class="cat-btn" data-cat="축산" onclick="selCat(this)">🥩 축산</button>
        <button type="button" class="cat-btn" data-cat="공산" onclick="selCat(this)">📦 공산</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">상품명 / 점검 항목</label>
      <input type="text" class="form-input" id="inProduct" placeholder="예: 수입과일 바나나">
    </div>

    <div class="form-group">
      <label class="form-label">체크리스트 (우수/미흡)</label>
      <div class="checklist" id="checklistBox">
        <!-- 동적 생성 -->
      </div>
      <div style="text-align:right;font-size:13px;font-weight:800;color:var(--muted)">
        예상 점수: <span id="previewScore" style="font-size:18px">—</span>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">현장 사진</label>
      <div class="photo-area" id="photoArea" onclick="document.getElementById('fileInput').click()">
        <div class="ico">📸</div>
        <div style="font-size:14px;font-weight:700;margin-bottom:4px">사진 촬영 또는 선택</div>
        <div class="photo-hint">터치해서 카메라 또는 갤러리 열기</div>
      </div>
      <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(event)">
    </div>

    <div class="form-group">
      <label class="form-label">메모 / 특이사항</label>
      <textarea class="form-textarea" id="inMemo" placeholder="진열 상태, 개선점 등"></textarea>
    </div>
    <div style="height:80px"></div>
  </div>
  <button class="btn-submit" id="btnSave" onclick="savePoint()">점검 저장</button>
</div>

<!-- 이력 화면 -->
<div id="historyView" class="hidden">
  <div class="hdr">
    <button class="hdr-back" onclick="showView('home')">←</button>
    <div class="hdr-logo">점검 이력</div>
    <span></span>
  </div>
  <div class="filter-bar">
    <button class="filter-chip active" onclick="filterStore(this, '')">전체</button>
    <button class="filter-chip" onclick="filterStore(this, '강서점')">강서</button>
    <button class="filter-chip" onclick="filterStore(this, '강남점')">강남</button>
    <button class="filter-chip" onclick="filterStore(this, '분당점')">분당</button>
    <button class="filter-chip" onclick="filterStore(this, '송파점')">송파</button>
    <button class="filter-chip" onclick="filterStore(this, '평촌점')">평촌</button>
    <button class="filter-chip" onclick="filterStore(this, '부천점')">부천</button>
    <button class="filter-chip" onclick="filterStore(this, '야탑점')">야탑</button>
    <button class="filter-chip" onclick="filterStore(this, '불광점')">불광</button>
    <button class="filter-chip" onclick="filterStore(this, '신구로점')">신구로</button>
    <button class="filter-chip" onclick="filterStore(this, '구의점')">구의</button>
  </div>
  <div id="historyList"></div>
</div>

<!-- 관리자 메뉴 화면 -->
<div id="adminMenuView" class="hidden">
  <div class="hdr">
    <button class="hdr-back" onclick="showView('home')">←</button>
    <div class="hdr-logo">👑 관리자 메뉴</div>
    <span></span>
  </div>
  <div class="section-label">점검 관리</div>
  <button class="menu-btn menu-btn-sub" onclick="showView('dashboard')">
    <span class="ico">📊</span>
    <div>
      <div>지점별 순위 대시보드</div>
      <div class="sub-text" style="color:var(--muted)">이번 달 점수 집계 및 순위</div>
    </div>
    <span class="arrow">›</span>
  </button>
  <button class="menu-btn menu-btn-sub" onclick="showView('history')">
    <span class="ico">💬</span>
    <div>
      <div>점검 이력 + 코멘트</div>
      <div class="sub-text" style="color:var(--muted)">전체 점검 조회 및 피드백 작성</div>
    </div>
    <span class="arrow">›</span>
  </button>

  <div class="section-label">계정</div>
  <button class="menu-btn menu-btn-sub" onclick="logoutAdmin()" style="color:var(--red)">
    <span class="ico">🚪</span>
    <div>
      <div>로그아웃</div>
      <div class="sub-text" style="color:var(--muted)">관리자 모드 종료</div>
    </div>
    <span class="arrow">›</span>
  </button>
</div>

<!-- 대시보드 (관리자) -->
<div id="dashboardView" class="hidden">
  <div class="hdr">
    <button class="hdr-back" onclick="showView('home')">←</button>
    <div class="hdr-logo">지점별 순위</div>
    <span></span>
  </div>
  <div class="dashboard-header">
    <div style="font-size:13px;color:var(--muted);font-weight:700">이번 달 VMD 점검 점수</div>
    <div class="dashboard-stat" id="dashboardStat"></div>
  </div>
  <div class="rank-list" id="rankList"></div>
</div>

<!-- 관리자 로그인 모달 -->
<div class="modal" id="adminModal">
  <div class="modal-content">
    <div class="modal-title">🔐 관리자 로그인</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:12px">관리자 비밀번호를 입력하세요</div>
    <input type="password" class="form-input" id="adminPwd" placeholder="비밀번호" onkeydown="if(event.key==='Enter')loginAdmin()">
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" onclick="closeAdminModal()">취소</button>
      <button class="modal-btn modal-btn-primary" onclick="loginAdmin()">로그인</button>
    </div>
  </div>
</div>

<!-- 코멘트 모달 -->
<div class="modal" id="commentModal">
  <div class="modal-content">
    <div class="modal-title">💬 관리자 코멘트</div>
    <textarea class="form-textarea" id="commentText" placeholder="개선 사항 또는 피드백을 입력하세요"></textarea>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" onclick="closeCommentModal()">취소</button>
      <button class="modal-btn modal-btn-primary" onclick="saveComment()">등록</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAq1KOZtnMuRUVR7brp_cDTtGhTbdOsZkQ",
  authDomain: "kims-checklist.firebaseapp.com",
  projectId: "kims-checklist",
  storageBucket: "kims-checklist.firebasestorage.app",
  messagingSenderId: "880283689093",
  appId: "1:880283689093:web:7f0ce14ada5f10b20e89ec",
  measurementId: "G-Q20N8V5K71"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
window.fb = { collection, addDoc, getDocs, deleteDoc, doc, query, orderBy, updateDoc };
window.firebaseReady = true;
</script>

<script>
// ═══════════ 설정 ═══════════
const ADMIN_PASSWORD = 'vmd12!';

// 점검 유형별 체크리스트
const CHECKLISTS = {
  VM: [
    '상품 페이싱(면취) 상태 양호',
    '가격표 / POP 부착 완료',
    '진열 높이 기준 준수',
    '색상 배열 / 그루핑 적절',
    '청결 상태 양호',
  ],
  광고: [
    '광고물 부착 위치 정확',
    '영상물 정상 재생',
    'POP 최신 버전 사용',
    '훼손/변색 없음',
    '홍보 문구 일치',
  ],
  청소: [
    '바닥 청결 상태',
    '매대/선반 정돈 상태',
    '집기 오염 없음',
    '쓰레기 적시 처리',
    '통로 이물질 없음',
  ],
  품질: [
    '상품 신선도 양호',
    '유통기한 정상',
    '포장 상태 이상 없음',
    '변색/손상 없음',
    '온도 관리 적절',
  ],
};

let selectedType = 'VM';
let selectedCat = '';
let selectedPhoto = '';
let currentFilterStore = '';
let isAdmin = false;
let checkStates = {};  // {itemIndex: 'pass' | 'fail' | null}
let currentCommentDocId = '';

// ═══════════ 관리자 모드 ═══════════
function openAdminMenu(){
  if(isAdmin){
    showView('adminMenu');
  } else {
    document.getElementById('adminModal').classList.add('show');
    document.getElementById('adminPwd').value = '';
    setTimeout(()=>document.getElementById('adminPwd').focus(), 100);
  }
}

function loginAdmin(){
  const pwd = document.getElementById('adminPwd').value;
  if(pwd === ADMIN_PASSWORD){
    isAdmin = true;
    closeAdminModal();
    toast('👑 관리자 로그인 완료');
    showView('adminMenu');
  } else {
    toast('❌ 비밀번호가 틀렸습니다');
  }
}

function logoutAdmin(){
  if(!confirm('관리자 모드를 종료할까요?')) return;
  isAdmin = false;
  toast('🔓 로그아웃 완료');
  showView('home');
}

function closeAdminModal(){
  document.getElementById('adminModal').classList.remove('show');
}

// ═══════════ 뷰 전환 ═══════════
function showView(name){
  ['homeView','registerView','historyView','dashboardView','adminMenuView'].forEach(v=>{
    document.getElementById(v).classList.add('hidden');
  });
  const map = {home:'homeView', register:'registerView', history:'historyView', dashboard:'dashboardView', adminMenu:'adminMenuView'};
  document.getElementById(map[name]).classList.remove('hidden');
  if(name==='register') resetForm();
  if(name==='history') loadHistory();
  if(name==='dashboard') loadDashboard();
  window.scrollTo(0,0);
}

// ═══════════ 점검 등록 ═══════════
function selType(btn){
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  selectedType = btn.dataset.type;
  renderChecklist();
}

function selCat(btn){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  selectedCat = btn.dataset.cat;
}

function renderChecklist(){
  const box = document.getElementById('checklistBox');
  const items = CHECKLISTS[selectedType] || [];
  checkStates = {};
  box.innerHTML = items.map((text, i) => `
    <div class="check-item">
      <div class="check-item-text">${text}</div>
      <button type="button" class="check-btn" onclick="toggleCheck(${i}, 'pass')" id="chk-${i}-pass">✓</button>
      <button type="button" class="check-btn" onclick="toggleCheck(${i}, 'fail')" id="chk-${i}-fail">✗</button>
    </div>
  `).join('');
  updatePreviewScore();
}

function toggleCheck(i, state){
  checkStates[i] = checkStates[i] === state ? null : state;
  const pass = document.getElementById(`chk-${i}-pass`);
  const fail = document.getElementById(`chk-${i}-fail`);
  pass.classList.remove('pass');
  fail.classList.remove('fail');
  if(checkStates[i] === 'pass') pass.classList.add('pass');
  if(checkStates[i] === 'fail') fail.classList.add('fail');
  updatePreviewScore();
}

function calcScore(){
  const items = CHECKLISTS[selectedType] || [];
  const total = items.length;
  let pass = 0, answered = 0;
  for(let i=0;i<total;i++){
    if(checkStates[i]) answered++;
    if(checkStates[i] === 'pass') pass++;
  }
  if(answered === 0) return null;
  return Math.round((pass / total) * 100);
}

function scoreGrade(score){
  if(score >= 80) return 'A';
  if(score >= 50) return 'B';
  return 'C';
}

function updatePreviewScore(){
  const s = calcScore();
  const el = document.getElementById('previewScore');
  if(s === null){
    el.textContent = '—';
    el.style.color = 'var(--muted)';
  } else {
    const g = scoreGrade(s);
    el.textContent = `${s}점 (${g})`;
    el.style.color = g === 'A' ? 'var(--green)' : g === 'B' ? 'var(--yellow)' : 'var(--red)';
  }
}

function handlePhoto(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    const img = new Image();
    img.onload = function(){
      const canvas = document.createElement('canvas');
      const maxW = 800;
      const ratio = img.width > maxW ? maxW / img.width : 1;
      canvas.width = img.width * ratio;
      canvas.height = img.height * ratio;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      selectedPhoto = canvas.toDataURL('image/jpeg', 0.7);
      showPreview(selectedPhoto);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function showPreview(dataUrl){
  const area = document.getElementById('photoArea');
  area.classList.add('has-img');
  area.innerHTML = `
    <img src="${dataUrl}">
    <button class="photo-remove" onclick="event.stopPropagation();removePhoto()">✕</button>
  `;
}

function removePhoto(){
  selectedPhoto = '';
  const area = document.getElementById('photoArea');
  area.classList.remove('has-img');
  area.innerHTML = `
    <div class="ico">📸</div>
    <div style="font-size:14px;font-weight:700;margin-bottom:4px">사진 촬영 또는 선택</div>
    <div class="photo-hint">터치해서 카메라 또는 갤러리 열기</div>
  `;
  document.getElementById('fileInput').value = '';
}

async function savePoint(){
  const store = document.getElementById('inStore').value;
  const product = document.getElementById('inProduct').value.trim();
  const memo = document.getElementById('inMemo').value.trim();
  const score = calcScore();

  if(!store) return toast('지점을 선택하세요');
  if(!selectedCat) return toast('카테고리를 선택하세요');
  if(!product) return toast('상품명을 입력하세요');
  if(score === null) return toast('체크리스트를 한 개 이상 체크하세요');

  const btn = document.getElementById('btnSave');
  btn.disabled = true;
  btn.textContent = '저장 중...';

  try{
    await window.fb.addDoc(window.fb.collection(window.db, 'checklist'), {
      type: selectedType,
      store, category: selectedCat, product, memo,
      photo: selectedPhoto,
      checkStates, score, grade: scoreGrade(score),
      adminComment: '',
      createdAt: new Date().toISOString(),
      yearMonth: new Date().toISOString().slice(0,7),
    });
    toast(`✅ 저장 완료 (${score}점 · ${scoreGrade(score)}등급)`);
    setTimeout(()=>showView('home'), 1200);
  } catch(e) {
    console.error(e);
    toast('❌ 저장 실패: ' + e.message);
    btn.disabled = false;
    btn.textContent = '점검 저장';
  }
}

function resetForm(){
  document.getElementById('inStore').value='';
  document.getElementById('inProduct').value='';
  document.getElementById('inMemo').value='';
  selectedCat='';
  selectedPhoto='';
  selectedType = 'VM';
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.type-btn[data-type="VM"]').classList.add('active');
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  removePhoto();
  renderChecklist();
  const btn = document.getElementById('btnSave');
  btn.disabled = false;
  btn.textContent = '점검 저장';
}

// ═══════════ 이력 조회 ═══════════
async function loadHistory(){
  const listEl = document.getElementById('historyList');
  listEl.innerHTML = '<div class="loading"><span class="spinner"></span>불러오는 중...</div>';

  try{
    const q = window.fb.query(window.fb.collection(window.db, 'checklist'), window.fb.orderBy('createdAt', 'desc'));
    const snapshot = await window.fb.getDocs(q);

    const items = [];
    snapshot.forEach(d => items.push({ id: d.id, ...d.data() }));

    if(items.length === 0){
      listEl.innerHTML = '<div class="list-empty">아직 등록된 점검이 없습니다</div>';
      return;
    }

    const filtered = currentFilterStore ? items.filter(i => i.store === currentFilterStore) : items;

    if(filtered.length === 0){
      listEl.innerHTML = '<div class="list-empty">이 지점의 점검 기록이 없습니다</div>';
      return;
    }

    let html = '';
    filtered.forEach(item => {
      const date = new Date(item.createdAt);
      const dateStr = `${date.getFullYear()}.${String(date.getMonth()+1).padStart(2,'0')}.${String(date.getDate()).padStart(2,'0')} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
      const grade = item.grade || 'C';
      const score = item.score ?? '—';
      const typeIcon = item.type === '광고' ? '📣' : item.type === '청소' ? '🧹' : item.type === '품질' ? '✨' : '📊';
      const typeText = item.type || 'VM';

      html += `
        <div class="list-item">
          ${item.photo ? `<img src="${item.photo}">` : ''}
          <div class="list-item-header">
            <div style="flex:1">
              <div class="list-item-title">[${item.category}] ${item.product}</div>
              <div class="list-item-meta">
                <span>${typeIcon} ${typeText}</span>
                <span>📍 ${item.store}</span>
                <span>🕐 ${dateStr}</span>
              </div>
            </div>
            <div>
              <span class="score-badge score-${grade}">${score}점 · ${grade}</span>
            </div>
          </div>
          ${item.memo ? `<div class="list-item-memo">${item.memo.replace(/\n/g,'<br>')}</div>` : ''}
          ${item.adminComment ? `
            <div class="admin-comment">
              <div class="ac-label">💬 관리자 코멘트</div>
              ${item.adminComment.replace(/\n/g,'<br>')}
            </div>
          ` : ''}
          <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:10px">
            ${isAdmin ? `<button onclick="openCommentModal('${item.id}','${(item.adminComment||'').replace(/'/g,"\\'").replace(/\n/g,'\\n')}')" style="background:var(--yellow);border:none;color:#fff;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">💬 코멘트</button>` : ''}
            <button onclick="deleteItem('${item.id}')" style="background:none;border:none;color:var(--red);font-size:12px;cursor:pointer;font-family:inherit;font-weight:700">🗑 삭제</button>
          </div>
        </div>
      `;
    });
    listEl.innerHTML = html;

  } catch(e){
    console.error(e);
    listEl.innerHTML = `<div class="list-empty" style="color:var(--red)">❌ 불러오기 실패<br><br><small>${e.message}</small></div>`;
  }
}

function filterStore(btn, store){
  currentFilterStore = store;
  document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadHistory();
}

async function deleteItem(id){
  if(!confirm('이 점검을 삭제할까요?')) return;
  try{
    await window.fb.deleteDoc(window.fb.doc(window.db, 'checklist', id));
    toast('🗑 삭제 완료');
    loadHistory();
  } catch(e){
    toast('❌ 삭제 실패');
  }
}

// ═══════════ 관리자 코멘트 ═══════════
function openCommentModal(id, existing){
  currentCommentDocId = id;
  document.getElementById('commentText').value = existing || '';
  document.getElementById('commentModal').classList.add('show');
}

function closeCommentModal(){
  document.getElementById('commentModal').classList.remove('show');
}

async function saveComment(){
  const comment = document.getElementById('commentText').value.trim();
  try{
    await window.fb.updateDoc(window.fb.doc(window.db, 'checklist', currentCommentDocId), {
      adminComment: comment
    });
    toast('💬 코멘트 저장 완료');
    closeCommentModal();
    loadHistory();
  } catch(e){
    toast('❌ 저장 실패');
  }
}

// ═══════════ 대시보드 (관리자) ═══════════
async function loadDashboard(){
  const statEl = document.getElementById('dashboardStat');
  const listEl = document.getElementById('rankList');
  listEl.innerHTML = '<div class="loading"><span class="spinner"></span>집계 중...</div>';

  try{
    const snapshot = await window.fb.getDocs(window.fb.collection(window.db, 'checklist'));
    const items = [];
    snapshot.forEach(d => items.push(d.data()));

    const thisMonth = new Date().toISOString().slice(0,7);
    const monthItems = items.filter(i => i.yearMonth === thisMonth);

    // 지점별 평균 점수
    const byStore = {};
    monthItems.forEach(i => {
      if(!i.score) return;
      if(!byStore[i.store]) byStore[i.store] = { total: 0, count: 0, items: [] };
      byStore[i.store].total += i.score;
      byStore[i.store].count++;
      byStore[i.store].items.push(i);
    });

    const ranks = Object.entries(byStore).map(([store, data]) => ({
      store, avg: Math.round(data.total / data.count), count: data.count
    })).sort((a,b) => b.avg - a.avg);

    // 상단 통계
    const totalCount = monthItems.length;
    const avgScore = totalCount ? Math.round(monthItems.reduce((s,i)=>s+(i.score||0),0) / totalCount) : 0;
    const aCount = monthItems.filter(i => i.grade === 'A').length;

    statEl.innerHTML = `
      <div class="stat-card">
        <div class="stat-val">${totalCount}</div>
        <div class="stat-lbl">총 점검</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:${avgScore>=80?'var(--green)':avgScore>=50?'var(--yellow)':'var(--red)'}">${avgScore}</div>
        <div class="stat-lbl">평균 점수</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:var(--green)">${aCount}</div>
        <div class="stat-lbl">A등급</div>
      </div>
    `;

    if(ranks.length === 0){
      listEl.innerHTML = '<div class="list-empty">이번 달 점검 기록이 없습니다</div>';
      return;
    }

    let html = '';
    ranks.forEach((r, i) => {
      const medalClass = i===0 ? 'gold' : i===1 ? 'silver' : i===2 ? 'bronze' : 'normal';
      const medal = i===0 ? '🥇' : i===1 ? '🥈' : i===2 ? '🥉' : (i+1);
      const grade = scoreGrade(r.avg);
      const color = grade==='A' ? 'var(--green)' : grade==='B' ? 'var(--yellow)' : 'var(--red)';
      html += `
        <div class="rank-row">
          <div class="rank-medal ${medalClass}">${medal}</div>
          <div class="rank-name">
            ${r.store}
            <div class="rank-count">${r.count}건 점검</div>
          </div>
          <div class="rank-score" style="color:${color}">${r.avg}</div>
          <div class="score-badge score-${grade}">${grade}</div>
        </div>
      `;
    });
    listEl.innerHTML = html;

  } catch(e){
    console.error(e);
    listEl.innerHTML = `<div class="list-empty" style="color:var(--red)">❌ 집계 실패</div>`;
  }
}

// ═══════════ 토스트 ═══════════
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// 전역 노출
window.showView = showView;
window.selType = selType;
window.selCat = selCat;
window.toggleCheck = toggleCheck;
window.handlePhoto = handlePhoto;
window.removePhoto = removePhoto;
window.savePoint = savePoint;
window.filterStore = filterStore;
window.deleteItem = deleteItem;
window.toggleAdmin = openAdminMenu;
window.openAdminMenu = openAdminMenu;
window.loginAdmin = loginAdmin;
window.logoutAdmin = logoutAdmin;
window.closeAdminModal = closeAdminModal;
window.openCommentModal = openCommentModal;
window.closeCommentModal = closeCommentModal;
window.saveComment = saveComment;

// 시작
renderChecklist();

setTimeout(()=>{
  if(!window.firebaseReady){
    toast('⚠ Firebase 연결 중... 잠시만요');
  }
}, 2000);
</script>
</body>
</html>
